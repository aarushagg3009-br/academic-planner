      <div class="snapshot-item"><div class="snapshot-label">Math Level</div><div class="snapshot-value">${p.snapshot?.mathLevel || '—'}</div></div>
      <div class="snapshot-item"><div class="snapshot-label">Science Status</div><div class="snapshot-value">${p.snapshot?.scienceStatus || '—'}</div></div>
      <div class="snapshot-item"><div class="snapshot-label">Language</div><div class="snapshot-value">${p.snapshot?.languageStatus || '—'}</div></div>

        <div class="snapshot-label" style="color:var(--teal)">Target Tier</div>

      </div>
    </div>

    ${p.snapshot?.apResearchEligible ? `
    <div class="alert-box alert-green" style="margin-bottom:1.25rem">
      <div class="alert-title">⭐ AP Research Eligible — High Priority</div>
      <p style="font-size:0.88rem">${state.student.firstName} completed AP Seminar and is eligible for <strong>AP Research</strong> — the second course of the AP Capstone Diploma. This must be scheduled in the next available year as an elective slot.</p>
    </div>` : ''}

    <p style="font-size:0.92rem;line-height:1.7;color:var(--text2);padding:1.1rem 1.25rem;background:var(--cream);border-radius:6px;border:1px solid var(--border);margin-bottom:1.5rem">${p.snapshot?.overallAssessment || ''}</p>

    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
    <table class="plan-table">
      <thead><tr><th>Year</th><th>Subject Slot</th><th>Course</th><th>Grade</th></tr></thead>

          .sort((a,b) => (a.year||'').localeCompare(b.year||''))
          .map(c => {

            const gradeColor = ['A+','A','A-'].includes(grade) ? 'var(--green)' :
                               ['B+','B','B-'].includes(grade) ? 'var(--teal)' :
                               ['C+','C','C-'].includes(grade) ? 'var(--gold)' :

              <td><span class="tag tag-cp">${c.year||'—'}</span></td>
              <td style="color:var(--text3);font-size:0.82rem">${c.subject||'—'}</td>
              <td><strong>${c.course||'—'}</strong></td>

    ${p.schoolSpecificNotes?.length ? `
    <div class="alert-box alert-gold" style="margin-top:1.25rem">
      <div class="alert-title">📋 ${s.schoolName} — Key Notes from Program of Studies</div>
      <ul>${p.schoolSpecificNotes.map(n => `<li>${n}</li>`).join('')}</ul>
    </div>` : ''}
  </div>

  <!-- GRADE PLANS -->
  ${(p.gradePlans || []).map(g => renderGradeTab(g)).join('')}

  <!-- ROADMAP -->
  <div class="output-section card" id="tab-roadmap">
    <div class="section-divider"><h3>4-Year Course Roadmap</h3><div class="divider-line"></div></div>
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
    <table class="plan-table">
      <thead><tr>
        <th>Subject</th><th>Grade 9</th><th>Grade 10</th><th>Grade 11</th><th>Grade 12</th>
      </tr></thead>
      <tbody>
        ${(p.roadmap || []).map(r => `
        <tr>
          <td><strong>${r.subject}</strong></td>
          <td style="${r.highlight==='g9'?'color:var(--green);font-weight:600':''}">${r.g9||'—'}</td>
          <td style="${r.highlight==='g10'?'color:var(--green);font-weight:600':''}">${r.g10||'—'}</td>
          <td style="${r.highlight==='g11'?'color:var(--green);font-weight:600':''}">${r.g11||'—'}</td>
          <td style="${r.highlight==='g12'?'color:var(--green);font-weight:600':''}">${r.g12||'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>

    ${p.thresholds?.length ? `
    <div class="section-divider" style="margin-top:2rem"><h3>Critical Grade Thresholds</h3><div class="divider-line"></div></div>
    <p style="font-size:0.88rem;color:var(--text3);margin-bottom:1rem">These grades unlock or close doors for subsequent years. Missing a threshold can cascade into lost opportunities.</p>
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
    <table class="plan-table">
      <thead><tr><th>Course</th><th>Year</th><th>Grade Needed</th><th>What It Unlocks</th><th>If Missed</th></tr></thead>
      <tbody>
        ${p.thresholds.map(t => `
        <tr>
          <td><strong>${t.course}</strong></td>
          <td><span class="tag tag-cp">${t.year}</span></td>
          <td><span style="color:var(--green);font-weight:600">${t.gradeNeeded}+</span></td>
          <td>${t.unlocks}</td>
          <td style="color:var(--red);font-size:0.84rem">${t.consequence}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>` : ''}
  </div>

  <!-- STRATEGY -->
  <div class="output-section card" id="tab-rigor">
    <div class="section-divider"><h3>Course Rigor Strategy</h3><div class="divider-line"></div></div>
    ${p.rigorStrategy ? `
    ${p.rigorStrategy.careerTrackStrategy ? renderStrategyBlock('🎯 Career Track Strategy', p.rigorStrategy.careerTrackStrategy, 'orange') : ''}
    ${renderStrategyBlock('📝 English Strategy', p.rigorStrategy.englishPriority, 'teal')}
    ${renderStrategyBlock('📐 Math Strategy', p.rigorStrategy.mathStrategy, 'navy')}
    ${renderStrategyBlock('🔬 Science Strategy', p.rigorStrategy.scienceStrategy, 'green')}
    ${renderStrategyBlock('🌍 Language Strategy', p.rigorStrategy.languageStrategy, 'purple')}
    ${p.rigorStrategy.keyInsight ? `
    <div class="alert-box alert-gold" style="margin-top:1.5rem">
      <div class="alert-title">⭐ Key Strategic Insight</div>
      <p style="font-size:0.9rem;line-height:1.6">${p.rigorStrategy.keyInsight}</p>
    </div>` : ''}` : '<p>Strategy data not available.</p>'}
  </div>

  <!-- BOTTOM LINE -->
  <div class="output-section card" id="tab-bottomline">
    <div style="background:var(--navy);border-radius:8px;padding:2rem;color:#fff;margin-bottom:1.5rem">
      <h2 style="font-family:'Libre Baskerville',serif;font-size:1.8rem;font-weight:700;margin-bottom:0.75rem;color:#fff">${p.bottomLine?.title || 'Bottom Line'}</h2>
      <p style="color:rgba(255,255,255,0.8);font-size:0.95rem;line-height:1.7;margin-bottom:1.5rem">${p.bottomLine?.summary || ''}</p>
      <div style="border-top:1px solid rgba(255,255,255,0.15);padding-top:1.25rem">
        <p style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.5);margin-bottom:0.9rem;font-weight:600">Five Most Important Actions</p>
        ${(p.bottomLine?.actions || []).map((a, i) => `
        <div style="display:flex;gap:0.75rem;align-items:flex-start;margin-bottom:0.65rem">
          <span style="background:var(--gold);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;margin-top:1px">${i+1}</span>
          <p style="font-size:0.9rem;color:rgba(255,255,255,0.9);line-height:1.5">${a}</p>
        </div>`).join('')}
      </div>
    </div>
    <p class="disclaimer">This plan was generated based on available transcript data${state.posFound ? ' and the school\'s Program of Studies' : ''}. All course recommendations should be confirmed with your school counselor before finalizing your schedule. Prerequisites and course availability may have changed since this plan was generated.</p>
  </div>

  <!-- PRINT DISCLAIMER — hidden on screen -->
  <div class="print-disclaimer">
    Generated by AcademicPlan · No student data or transcripts are stored · All recommendations should be verified with your school counselor · ${new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})}
  </div>`;
}

function renderGradeTab(g) {
  const colorMap = { '9': 'var(--navy)', '10': 'var(--teal)', '11': 'var(--purple)', '12': '#a16207' };
  const color = colorMap[g.grade] || 'var(--navy)';
  const alertClassMap = { 'teal': 'alert-teal', 'green': 'alert-green', 'gold': 'alert-gold', 'purple': 'alert-purple', 'red': 'alert-red' };
  const alertClass = alertClassMap[g.alertType] || 'alert-teal';

  // Support both new schedule[] format and old courses[] format
  const rows = g.schedule || g.courses || [];

  // Slot color coding
  const slotColors = {
    'English':        '#dbeafe',
    'Mathematics':    '#d1fae5',
    'Science':        '#fef3c7',
    'Social Studies': '#ede9fe',
    'World Language': '#fce7f3',
    'Elective 1':     '#f0f9ff',
    'Elective 2':     '#f0f9ff',
    'Elective 3':     '#e0f0ff',  // converted core slot — slightly different shade
    'Elective 4':     '#e0f0ff',
    'PE/Health':      '#f1f5f9'
  };
  const slotTextColors = {
    'English':        '#1e40af',
    'Mathematics':    '#065f46',
    'Science':        '#92400e',
    'Social Studies': '#4c1d95',
    'World Language': '#9d174d',
    'Elective 1':     '#0369a1',
    'Elective 2':     '#0369a1',
    'Elective 3':     '#0c4a8a',
    'Elective 4':     '#0c4a8a',
    'PE/Health':      '#475569'
  };

  return `
  <div class="output-section card" id="tab-grade${g.grade}">
    <div style="background:${color};border-radius:8px;padding:1.1rem 1.4rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem">
      <div>
        <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.6);font-weight:600;margin-bottom:0.2rem">Grade ${g.grade} · ${g.year}</div>
        <div style="font-size:1.1rem;font-weight:600;color:#fff">${g.theme}</div>
      </div>
      <div style="background:rgba(255,255,255,0.15);padding:0.4rem 1rem;border-radius:100px;font-size:0.8rem;color:#fff;font-weight:500">${g.apCount} AP${g.apCount !== '1' ? 's' : ''} this year</div>
    </div>

    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
    <table class="plan-table">
      <thead><tr>
        <th style="width:130px">Slot</th>
        <th>Course</th>
        <th style="width:80px">Level</th>
        <th>Prerequisite</th>
        <th>Notes</th>
      </tr></thead>
      <tbody>
        ${rows.map(c => {
          const slot = c.slot || c.subject || '—';
          const course = c.course || '—';
          const level = c.level || 'CP';
          const bg = slotColors[slot] || '#f8f9fa';
          const fg = slotTextColors[slot] || '#374151';
          const isHighPriority = c.priority === 'high';
          const isPE = slot === 'PE/Health';
          const isStudyHall = (c.course||'').toLowerCase() === 'study hall';
          const isConverted = !!c._convertedFromSubject;
          const slotBg = slotColors[slot] || '#f8f9fa';
          const slotFg = slotTextColors[slot] || '#374151';
          return `<tr>
            <td>
              <span style="display:inline-block;padding:0.2rem 0.6rem;border-radius:100px;background:${slotBg};color:${slotFg};font-size:0.72rem;font-weight:700;letter-spacing:0.04em;white-space:nowrap">
                ${slot}${isConverted ? ' <span style="font-size:0.6rem;opacity:0.6">(freed)</span>' : ''}
              </span>
            </td>
            <td style="${isHighPriority?'color:var(--green);font-weight:600':''}${isPE||isStudyHall?'color:var(--text3);font-style:italic':''}">${isHighPriority?'⭐ ':''}${isStudyHall ? '📚 Study Hall' : course}</td>
            <td>${isStudyHall || isPE ? '' : `<span class="tag ${level==='AP'?'tag-ap':level==='Honors'?'tag-honors':'tag-cp'}">${level}</span>`}</td>
            <td style="font-size:0.82rem;color:var(--text3)">${c.prerequisite||'—'}</td>
            <td style="font-size:0.82rem;color:var(--text2)">${c.notes||'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>

    ${g.alertTitle ? `
    <div class="alert-box ${alertClass}" style="margin-top:1.25rem">
      <div class="alert-title">${g.alertTitle}</div>
      <ul>${(g.alertItems||[]).map(i => `<li>${i}</li>`).join('')}</ul>
    </div>` : ''}
  </div>`;
}


function renderStrategyBlock(title, content, color) {
  const colorMap = {
    teal:   ['var(--teal-light)', 'var(--teal)'],
    navy:   ['#e8edf5', 'var(--navy)'],
    green:  ['var(--green-light)', 'var(--green)'],
    purple: ['#ede9fe', '#4c1d95'],
    orange: ['var(--orange-light)', 'var(--orange)']
  };
  const [bg, fg] = colorMap[color] || colorMap.teal;
  return `
  <div style="margin-bottom:1.25rem">
    <h4 style="font-weight:600;font-size:0.9rem;color:${fg};margin-bottom:0.5rem">${title}</h4>
    <p style="font-size:0.9rem;line-height:1.7;color:var(--text2);padding:1rem 1.2rem;background:${bg};border-radius:6px">${content || '—'}</p>
  </div>`;
}

function switchTab(id, btn) {
  document.querySelectorAll('.output-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.output-tab').forEach(t => t.classList.remove('active'));
  const section = document.getElementById('tab-' + id);
  if (section) section.classList.add('active');
  btn.classList.add('active');
  window.scrollTo({ top: 120, behavior: 'smooth' });
}

// ── UTILITIES ──
function goBack() {
  if (state.currentStep > 0) {
    state.currentStep--;
    if (state.currentStep === 2) state.posSearched = false;
    render();
  }
}

function startOver() {
  Object.assign(state, {
    currentStep: 0, student: {}, transcripts: [],
    gradeTranscripts: {}, extraTranscripts: [],
    programOfStudies: null, posBase64: null, posFound: false, posSearched: false,
    interests: [], collegeTier: '', careerGoal: '', plan: null
  });
  render();
}

function showToast(msg, type = 'info') {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.id = 'toast';
  const colors = { error: '#8b1a1a', info: 'var(--teal)', success: 'var(--green)' };
  toast.style.cssText = `position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:${colors[type]};color:#fff;padding:0.75rem 1.5rem;border-radius:8px;font-size:0.9rem;font-weight:500;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:fadeSlideUp 0.3s ease;max-width:90vw;text-align:center`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

// ── INIT ──
render();
</script>
